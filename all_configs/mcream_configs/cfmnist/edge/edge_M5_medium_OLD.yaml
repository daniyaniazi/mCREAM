# mCREAM Configuration for Complete FashionMNIST
# This config extends CREAM with multi-expert graph learning

mode: train_cbm
seed: 42
dataset_name: Complete_Concept_FMNIST

# Dataset parameters
dataset_params:
  batch_size: 256
  workers: 2
  return_labels: true
  return_images: true

# Model name (for registry lookup)
model_name: mCREAM_FashionMNIST

# =============================================================================
# mCREAM-specific settings (NEW)
# =============================================================================
multi_expert:
  enabled: true
  num_experts: 5
  disagreement_level: medium  # low, medium, high
  
  # Aggregation method: 'edge', 'graph', 'combined', 'union', 'intersection', 'majority'
  aggregation_type: edge
  
  # Graph regularization weights
  graph_regularization:
    prior_weight: 0.1      # β: keep close to expert consensus
    sparsity_weight: 0.01  # γ: encourage sparse graph
    acyclicity_weight: 0.0 # δ: ensure DAG (optional)

# =============================================================================
# Model hyperparameters (same as CREAM)
# =============================================================================
hyperparameters_model2:
  num_classes: 10
  num_concepts: 11           # K = 11 for Complete FashionMNIST
  num_exogenous: 131         # 11 concepts × 11 (input_per_concept) + 10 side + 10 (for task input)
  num_side_channel: 20       # Side channel size
  concept_representation: group_soft
  num_hidden_layers_in_maskedmlp: 0
  previous_model_output_size: 128
  side_dropout: true
  dropout_prob: 0.9          # p: higher = more concept-reliant

hyperparameters:
  learning_rate: 0.001
  lambda_weight: 1           # λ: weight of concept loss
  frozen_model1: true        # Freeze backbone

# =============================================================================
# Training parameters
# =============================================================================
trainer_param:
  max_epochs: 50
  gradient_clip_val: null
  gradient_clip_algorithm: null

# =============================================================================
# Paths
# =============================================================================
paths:
  default_root_dir: ./experiments/
  metric_dir: ./last_metrics/
  
  # Ground truth DAG (for reference/evaluation)
  DAG_file: ./data/FashionMNIST/Complete_Concept_FMNIST_DAG.csv
  
  # Expert graphs directory (generated by generate_expert_graphs.py)
  expert_graphs_dir: ./data/FashionMNIST/expert_graphs/medium_disagreement/
  
  # Pretrained backbone
  input_model_path: ./pretrained_models/FMNIST/version_0/checkpoints/epoch=49-step=10750.ckpt
  
  # Mutually exclusive concept groups
  softmax_mask: ./data/FashionMNIST/mutually_exclusive_relationships_COMPLETE.json
