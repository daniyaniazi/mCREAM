# mCREAM - Intersection Baseline (M=5, Medium Disagreement)
# Baseline 4: Keep only edges ALL experts agree on (AND operation)

mode: train_cbm
seed: 42
dataset_name: Complete_Concept_FMNIST

dataset_params:
  batch_size: 256
  workers: 2
  return_labels: true
  return_images: true

# Backbone model (for feature extraction)
backbone_model: Standard_FashionMNIST

# =============================================================================
# mCREAM Settings
# =============================================================================
multi_expert:
  enabled: true
  num_experts: 5
  disagreement_level: medium
  aggregation_type: intersection    # Non-learnable: AND of all expert edges
  graph_regularization:
    prior_weight: 0.0
    sparsity_weight: 0.0
    acyclicity_weight: 0.0

# =============================================================================
# Model Hyperparameters (CREAM-compatible)
# =============================================================================
hyperparameters_model2:
  num_classes: 10
  num_concepts: 11
  num_exogenous: 128
  num_side_channel: 40
  concept_representation: group_soft
  num_hidden_layers_in_maskedmlp: 0
  previous_model_output_size: 128
  side_dropout: true
  dropout_prob: 0.9

hyperparameters:
  learning_rate: 0.001
  lambda_weight: 1
  frozen_model1: true

trainer_param:
  max_epochs: 50
  gradient_clip_val: null
  gradient_clip_algorithm: null

paths:
  default_root_dir: ./experiments/
  metric_dir: ./last_metrics/
  DAG_file: ./data/FashionMNIST/Complete_Concept_FMNIST_DAG.csv
  expert_graphs_dir: ./data/FashionMNIST/expert_graphs/M5/medium/
  input_model_path: ./pretrained_models/FMNIST/version_0/checkpoints/epoch=49-step=10750.ckpt
  softmax_mask: ./data/FashionMNIST/mutually_exclusive_relationships_COMPLETE.json
