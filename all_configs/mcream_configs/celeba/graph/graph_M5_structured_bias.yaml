# mCREAM - Graph-level with Structured Expert Bias (M=5) - CelebA
# Experts: 2 conservative, 2 liberal, 1 balanced

mode: train_cbm
seed: 42
dataset_name: CelebA

dataset_params:
  batch_size: 256
  workers: 2
  class_name: unfair

backbone_model: Standard_CelebA

paths:
  default_root_dir: ./experiments/
  metric_dir: ./last_metrics/
  DAG_file: ./data/CelebA/final_DAG_unfair.csv
  input_model_path: ./pretrained_models/CelebA/version_11/checkpoints/epoch=89-step=6840.ckpt
  expert_graphs_dir: ./data/CelebA/expert_graphs/M5/structured_bias/

multi_expert:
  enabled: true
  num_experts: 5
  expert_types: ["conservative", "conservative", "liberal", "liberal", "balanced"]
  aggregation_type: graph
  graph_regularization:
    prior_weight: 0.1
    sparsity_weight: 0.01
    acyclicity_weight: 0.0

hyperparameters_model2:
  num_classes: 1
  num_concepts: 7
  num_exogenous: 75
  num_side_channel: 5
  concept_representation: soft
  num_hidden_layers_in_maskedmlp: 0
  previous_model_output_size: 512
  side_dropout: true
  dropout_prob: 0.1

hyperparameters:
  learning_rate: 0.001
  lambda_weight: 1
  frozen_model1: true

trainer_param:
  max_epochs: 20
  gradient_clip_val: null

experiment_name: graph_M5_structured_bias
